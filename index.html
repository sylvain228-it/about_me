<!doctype html>
<html lang="fr">
  <head>
    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme')
          if (t === 'dark' || t === 'light') {
            document.documentElement.classList.add(t)
            return
          }
          if (window.matchMedia('(prefers-color-scheme: dark)').matches) document.documentElement.classList.add('dark')
          else document.documentElement.classList.add('light')
        } catch (e) {
          document.documentElement.classList.add('dark')
        }
      })()
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="ANANI Kokouvi Yovo — développeur full stack web & mobile à Lomé (Togo). Laravel, NestJS, React, Next.js, Flutter. Formateur chez DTECH GROUP."
    />
    <meta name="theme-color" content="#0f172a" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <title>ANANI Kokouvi Yovo | Développeur full stack</title>
  </head>

</html>
